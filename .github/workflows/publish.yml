name: Publish CMS

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v5

      # 2. Setup Node (OIDC-safe)
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      # 3. Ensure modern npm (OIDC + provenance support)
      - name: Update npm
        run: npm install -g npm@latest

      # 4. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 5. Build CMS (UMD only)
      - name: Build CMS
        run: npm run build

      # 6. Publish to npm using GitHub trusted publishing
      - name: Publish to npm
        run: npm publish --access public --provenance
